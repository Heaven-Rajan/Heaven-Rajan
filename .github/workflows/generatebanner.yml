name: Generate Banner

on:
  push:
    paths:
      - "scripts/generate_banner.py"   # re-run whenever the script changes
  workflow_dispatch: {}                 # lets you trigger it manually too

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate banner.svg
        run: python scripts/generate_banner.py

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add banner.svg
          if git commit -m "generate banner"; then git push; fi
